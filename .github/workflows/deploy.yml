name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install & Build
        working-directory: ./pixelated
        run: |
          npm install
          npm run build

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Hapus file lama di root agar tidak bentrok, tapi jangan hapus folder .git atau folder pixelated
          # Kita hanya ingin menyalin isi folder dist ke root
          cp -r ./pixelated/dist/* ./
          
          git add .
          git commit -m "deploy: update build assets dari folder pixelated" || echo "No changes"
          git push origin main
